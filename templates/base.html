{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to our Interior Design Studio, where we create beautiful and functional spaces tailored to your style.">
    <title>{% block title %}Interior Design{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}" style="font-size: 1.5rem; font-weight: bold; height: 65px;">
                <img src="{% static 'images/logo.png' %}" alt="Logo" style="height: 60px; width: 480px; transition: opacity 0.3s ease, transform 0.3s ease;" 
                     onmouseover="this.style.opacity='0.9'; this.style.transform='rotate(1.5deg)';" 
                     onmouseout="this.style.opacity='1'; this.style.transform='rotate(0deg)';">
            </a>
            
            

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="{% url 'service_list' %}">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="{% url 'portfolio' %}">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="{% url 'about' %}">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="{% url 'contact' %}">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content Block -->
    {% block content %}
    <!-- Content will be inserted here -->
    {% endblock %}

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <!-- Social Media Bar -->
            <div class="social-media-bar">
                <a href="https://facebook.com/yourprofile" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="https://twitter.com/yourprofile" target="_blank" class="social-icon"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/yourprofile" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
            </div>
            <p>&copy; 2024 Interior Design Studio. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
