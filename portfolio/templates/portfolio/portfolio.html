{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5">
    <div class="container">
        <h2 class="text-center">Our Portfolio</h2>
        <p class="text-center">Explore our recent projects and discover how we can enhance your space.</p>
        <div class="row">
            {% for project in projects %}
            <div class="col-md-4">
                <div class="card mb-4 portfolio-item">
                    <img src="{{ project.image.url }}" loading="lazy" class="card-img-top" alt="{{ project.title }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ project.title }}</h5>
                        <p class="card-text">{{ project.short_description }}</p>
                        <a href="{% url 'project_detail' project.id %}" class="btn btn-primary">View More</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
